name: Build macOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install zeromq cppzmq

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.1'
          modules: 'qtserialport qtserialbus'

      - name: Fix ZMQ paths in .pro file
        run: |
          sed -i '' 's|/opt/homebrew/Cellar/zeromq/[^/]*/include|/opt/homebrew/include|g' MIPS.pro
          sed -i '' 's|/opt/homebrew/Cellar/zeromq/[^/]*/lib|/opt/homebrew/lib|g' MIPS.pro
          sed -i '' 's|/opt/homebrew/Cellar/cppzmq/[^/]*/include|/opt/homebrew/include|g' MIPS.pro

      - name: Create build directory
        run: |
          rm -f .qmake.stash
          mkdir build
        
      - name: Build
        run: |
          qmake ../MIPS.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)
        working-directory: build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIPS-macOS
          path: build/MIPS.app
