name: Sign and Notarize macOS

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build workflow run ID (find in Actions tab URL)'
        required: true
        type: string
      version:
        description: 'Version number (e.g. v2.23)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sign-macos:
    runs-on: macos-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download unsigned macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: MIPS-macOS
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip app bundle
        run: |
          unzip MIPS-macOS-${{ github.event.inputs.version }}.zip
          
      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "temp_password" build.keychain
          rm certificate.p12

      - name: Sign and notarize
        env:
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP_NAME="MIPS"
          APPLE_ID="gaa@gaa-ce.com"
          TEAM_ID="959P7R3DNF"
          SIGNING_IDENTITY="Developer ID Application: Gordon Anderson (959P7R3DNF)"

          echo "▶ Signing..."
          codesign --deep --force --verify --verbose \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            $APP_NAME.app

          echo "▶ Zipping for notarization..."
          ditto -c -k --keepParent $APP_NAME.app $APP_NAME.zip

          echo "▶ Submitting for notarization..."
          xcrun notarytool submit $APP_NAME.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait

          echo "▶ Stapling..."
          xcrun stapler staple $APP_NAME.app

          echo "▶ Verifying..."
          spctl --assess --verbose $APP_NAME.app
          echo "✅ Done!"

      - name: Zip signed app
        run: |
          ditto -c -k --keepParent MIPS.app \
            MIPS-macOS-${{ github.event.inputs.version }}.zip

      - name: Delete unsigned asset from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(echo "${{ github.event.inputs.version }}" | tr '[:lower:]' '[:upper:]')
          
          ASSET_ID=$(gh release view $VERSION \
            --json assets \
            --jq ".assets[] | select(.name == \"MIPS-macOS-$VERSION.zip\") | .id")
          
          if [ -n "$ASSET_ID" ]; then
            echo "Deleting unsigned asset ID: $ASSET_ID"
            gh api --method DELETE /repos/${{ github.repository }}/releases/assets/$ASSET_ID
          else
            echo "No unsigned asset found, skipping delete"
          fi
          
      - name: Upload signed app to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: MIPS-macOS-${{ github.event.inputs.version }}.zip

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIPS-macOS-signed
          path: MIPS-macOS-${{ github.event.inputs.version }}.zip
