name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.1'
          modules: 'qtserialport qtserialbus'

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          C:/vcpkg/vcpkg.exe install zeromq:x64-windows

      - name: Fix ZMQ paths in .pro file
        shell: pwsh
        run: |
          (Get-Content MIPS.pro) -replace 
            'C:/Users/Gordon/vcpkg/installed/x64-windows', 
            'C:/vcpkg/installed/x64-windows' | 
          Set-Content MIPS.pro

      - name: Create build directory
        run: |
          del /f .qmake.stash 2>nul
          mkdir build
        shell: cmd

      - name: Build
        shell: cmd
        run: |
          call "%Qt6_DIR%\..\..\..\..\bin\qtenv2.bat"
          cd build
          qmake ..\MIPS.pro CONFIG+=release
          nmake
        working-directory: .

      - name: Deploy Qt frameworks
        shell: cmd
        run: |
          windeployqt MIPS.exe
        working-directory: build\release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIPS-Windows
          path: build/release/
