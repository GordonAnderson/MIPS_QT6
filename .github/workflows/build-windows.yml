name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC compiler
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.1'
          modules: 'qtserialport qtserialbus'

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          C:/vcpkg/vcpkg.exe install zeromq:x64-windows

      - name: Create build directory
        shell: cmd
        run: |
          if exist .qmake.stash del .qmake.stash
          if not exist build mkdir build

      - name: Build
        shell: cmd
        working-directory: build
        run: |
          qmake ..\MIPS.pro CONFIG+=release
          nmake

      - name: Deploy Qt frameworks
        shell: cmd
        working-directory: build
        run: |
          windeployqt release\MIPS.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIPS-Windows
          path: build/release/
